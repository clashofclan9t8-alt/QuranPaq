<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Countries</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:sans-serif;

  background:
  linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.3)),
  url("background.png");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  min-height:100vh;
}

/* ⭐ Animated stars */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background-image:
  radial-gradient(white 1px, transparent 1px),
  radial-gradient(white 1px, transparent 1px),
  radial-gradient(white 2px, transparent 2px);

  background-size:120px 120px;
  background-position:
  0 0,
  50px 50px,
  100px 100px;

  opacity:0.3;
  animation:starsMove 60s linear infinite;
  pointer-events:none;
}

@keyframes starsMove{
  from{ transform:translateY(0); }
  to{ transform:translateY(-200px); }
}

/* ⭐ HEADER */
.top-section{
  position:relative;  /* ❌ sticky remove */
  padding-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ⭐ Notice Image */
.notice{
  position:relative;   /* ❌ আগে fixed/absolute ছিল */
  top:0;
  left:0;
  transform:none;

  width:100%;
  max-width:600px;
  margin-bottom:20px;
}

.notice img{
  width:100%;
  display:block;
}

.notice img{
  width:100%;
  border-radius:10px;
}

/* ⭐ Search */
.search-box{
  margin-top:10px;
  margin-bottom:10px;
}

/* ⭐ LIST */
.list{
  position:relative;
  z-index:2;
}

.list.hide{
  opacity:0;
  transform:translateY(-20px);
}

/* ⭐ CARD */
.country-card{
  background:rgba(8,25,55,0.6);
  backdrop-filter:blur(10px);

  border-radius:15px;
  padding:12px;
  margin-bottom:10px;

  display:flex;
  align-items:center;
  gap:12px;

  color:white;
  transition:0.2s;
}

.country-card:hover{
  transform:scale(1.02);
}

.flag{
  width:45px;
  height:30px;
  border-radius:5px;
}

.country-name{
  font-size:20px;
}

/* 📱 MOBILE */
@media(max-width:768px){
  body{
    background-attachment:scroll;
  }
}

  .notice{
    top:10px;
    max-width:90%;
  }

  .search-box{
    font-size:16px;
    padding:10px;
  }

  .country-card{
    padding:10px;
  }

  .country-name{
    font-size:18px;
  }

  .flag{
    width:40px;
    height:28px;
  }
}
body, html{
  overflow-x:hidden;
}
/* 💻 DESKTOP */
@media(min-width:769px){
  .top-section{
    padding-top:250px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top-section">

  <div class="notice">
    <img src="overlay.png" alt="Notice">
  </div>

  <input type="text" class="search-box" placeholder="Search country...">

</div>

<!-- LIST -->
<div class="list" id="countryList">

  <!-- SAME YOUR COUNTRY LIST (short demo) -->
  <div class="country-card"><img src="https://flagcdn.com/w80/af.png" class="flag"><div class="country-name">Afghanistan</div></div>
  <div class="country-card"><img src="https://flagcdn.com/w80/bd.png" class="flag"><div class="country-name">Bangladesh</div></div>
  <div class="country-card"><img src="https://flagcdn.com/w80/us.png" class="flag"><div class="country-name">United States</div></div>
  <div class="country-card"><img src="https://flagcdn.com/w80/sa.png" class="flag"><div class="country-name">Saudi Arabia</div></div>

  <!-- 👉 তুমি এখানে তোমার full list paste করবে -->

</div>

<script>
const searchBox = document.querySelector(".search-box");
const countries = document.querySelectorAll(".country-card");
const list = document.querySelector(".list");

/* 🔍 SEARCH */
searchBox.addEventListener("keyup", function () {
  const value = searchBox.value.toLowerCase();

  countries.forEach(card => {
    const name = card.innerText.toLowerCase();
    card.style.display = name.includes(value) ? "flex" : "none";
  });
});

/* 🎯 SCROLL EFFECT */
window.addEventListener("scroll", function(){
  const listTop = list.getBoundingClientRect().top;
  const searchBottom = searchBox.getBoundingClientRect().bottom;

  if(listTop < searchBottom){
    list.classList.add("hide");
  } else {
    list.classList.remove("hide");
  }
});
</script>

</body>
</html>
